name: Sniq

options:
  bundleIdPrefix: com.ohresearch
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "6"
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ONLY_ACTIVE_ARCH: NO
    ARCHS: "$(ARCHS_STANDARD)"

targets:
  Sniq:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Sniq.icns
    info:
      path: Generated/Info.plist
      properties:
        CFBundleName: Sniq
        CFBundleDisplayName: Sniq
        CFBundleIdentifier: com.ohresearch.sniq
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: Sniq
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSAccessibilityUsageDescription: Sniq needs accessibility access to detect window dragging and resize windows to grid positions.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ohresearch.sniq
        PRODUCT_NAME: Sniq
        DEVELOPMENT_TEAM: GBNQDWF6VV
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Developer ID Application"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
